rules:
  - id: bad-assert
    message: "asserting on result status"
    languages:
      - rust
    severity: ERROR
    patterns:
      - pattern-either:
        - pattern: assert!($EXPR.is_ok())
        - pattern: assert!($EXPR.is_ok(), ...)
        - pattern: assert!($EXPR.is_err())
        - pattern: assert!($EXPR.is_err(), ...)
        - pattern: assert_eq!($EXPR.is_ok(), ...)
        - pattern: assert_eq!($EXPR.is_err(), ...)
  - id: bad-assert-2
    message: "asserting on var unwrap"
    languages:
      - rust
    severity: ERROR
    patterns:
      - pattern-either:
        - pattern: assert_eq!($EXPR.unwrap(), $OTHER);
        - pattern: assert_eq!($OTHER, $EXPR.unwrap());
        - pattern: assert!($EXPR.unwrap())
        - pattern: assert_ne!($EXPR.unwrap(), $OTHER)
        - pattern: assert_ne!($OTHER, $EXPR.unwrap())
  - id: contains-todos
    message: "the code is incomplete, contains todo!"
    languages:
      - rust
    severity: ERROR
    patterns:
      - pattern: todo!(...)
  - id: let-unwrap-pattern
    message: "Avoid using let with panic-prone methods. Use pattern matching instead: if let Ok/Err or match."
    languages:
      - rust
    severity: ERROR
    patterns:
      - pattern-either:
        - pattern: let $VAR = result.unwrap();
        - pattern: let $VAR = result.expect(...);
        - pattern: let $VAR = result.unwrap_err();
        - pattern: let $VAR = result.expect_err(...);
  - id: uncaptured-expect-err
    message: "expect_err() called without capturing error for validation - error value should be captured and validated to ensure correct error type"
    languages:
      - rust
    severity: ERROR
    patterns:
      - pattern: $EXPR.expect_err(...)
      - pattern-not-inside: let $_ = ...
      - pattern-not-inside: let $_ = $EXPR.expect_err(...)
      - pattern-not-inside: |
          let $VAR = format!(..., $EXPR.expect_err(...), ...)
      - pattern-not-inside: |
          let $VAR = format!(..., $EXPR.expect_err(...))
      - pattern-not-inside: |
          format!(..., $EXPR.expect_err(...), ...)
      - pattern-not-inside: |
          format!(..., $EXPR.expect_err(...))
  - id: match-with-panic-ok-branch
    message: "Use unwrap_err() instead of matching with a panic on Ok branch. Example: let err = result.unwrap_err(); or assert!(result.unwrap_err().contains(...))"
    languages:
      - rust
    severity: ERROR
    pattern: |
      match $RESULT {
          Err($ERR) => $BODY,
          Ok($OK) => panic!(...),
      }
